<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>班级文化建设 · 新闻 · 深技大附中2024级七班</title>
  <meta name="description" content="深圳技术大学附属中学2024级七班 - 班级文化建设新闻板块" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%232d6a9f'/><text x='50' y='72' font-size='60' font-weight='900' fill='white' text-anchor='middle' font-family='sans-serif'>七</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #2d6a9f;
      --primary-light: #4a90c4;
      --accent: #f5a623;
      --bg: #f8faff;
      --text: #2c3e50;
      --text-light: #7f8c9b;
      --radius: 12px;
      --font: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* 顶部导航 */
    .top-bar {
      background: #fff;
      border-bottom: 1px solid #eef1f5;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .top-bar .back-link {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-light);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }
    .top-bar .back-link:hover { color: var(--primary); }
    .top-bar .back-link svg { width: 18px; height: 18px; }
    .top-bar .page-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }
    .top-bar .spacer { width: 60px; }

    /* 页面头部 */
    .page-header {
      background: #fff;
      padding: 48px 24px 36px;
      text-align: center;
    }
    .page-header h1 {
      font-size: 28px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: 1px;
    }
    .page-header p {
      font-size: 14px;
      color: var(--text-light);
      margin-top: 8px;
    }

    /* 新闻卡片网格 */
    .news-grid {
      max-width: 960px;
      margin: 24px auto 60px;
      padding: 0 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    /* 单张新闻卡片 */
    .news-card {
      background: #fff;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid #eef1f5;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .news-card:hover { border-color: var(--primary-light); }

    .news-card .card-top {
      background: var(--primary);
      padding: 16px 20px 12px;
      color: #fff;
      position: relative;
    }
    .news-card .card-top .card-date {
      font-size: 12px;
      opacity: 0.75;
      margin-bottom: 4px;
    }
    .news-card .card-top .card-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.4;
    }

    .news-card .card-body {
      padding: 16px 20px 20px;
    }
    .news-card .card-body .category-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      padding: 2px 10px;
      border-radius: 10px;
      margin-bottom: 8px;
    }
    .cat-politics { background: #e8f0fe; color: #1a56db; }
    .cat-finance { background: #fef3cd; color: #92400e; }
    .cat-tech { background: #e0f2fe; color: #0369a1; }
    .cat-social { background: #fce7f3; color: #9d174d; }
    .cat-entertainment { background: #f3e8ff; color: #7c3aed; }
    .cat-international { background: #fef9c3; color: #a16207; }
    .cat-sports { background: #dcfce7; color: #166534; }
    .cat-other { background: #f1f5f9; color: #475569; }

    .news-card .card-body .card-summary {
      font-size: 13px;
      color: var(--text-light);
      line-height: 1.7;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .news-card .card-footer {
      padding: 0 20px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .news-card .card-footer .item-count {
      font-size: 11px;
      color: #b0b8c4;
    }
    .news-card .card-footer .read-more {
      font-size: 12px;
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }
    .news-card .card-footer .read-more:hover { text-decoration: underline; }

    /* 展开详情 */
    .news-card .card-detail {
      display: none;
      padding: 0 20px 20px;
      border-top: 1px solid #eef1f5;
      margin-top: 0;
    }
    .news-card.expanded .card-detail { display: block; }
    .news-card.expanded .card-body .card-summary {
      -webkit-line-clamp: unset;
    }

    .card-detail .detail-category {
      font-size: 13px;
      font-weight: 600;
      color: var(--primary);
      margin: 12px 0 6px;
    }
    .card-detail .detail-items {
      list-style: none;
      padding: 0;
    }
    .card-detail .detail-items li {
      font-size: 13px;
      color: var(--text);
      line-height: 1.7;
      padding: 6px 0;
      border-bottom: 1px solid #f4f6f8;
      position: relative;
      padding-left: 14px;
    }
    .card-detail .detail-items li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 14px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--primary-light);
    }
    .card-detail .detail-items li:last-child { border-bottom: none; }

    /* 月份分隔线 */
    .month-divider {
      grid-column: 1 / -1;
      padding: 16px 0 4px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-light);
      border-bottom: 1px solid #e4e8ed;
    }

    /* 模态框（完整新闻阅读） */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
      overflow-y: auto;
    }
    .modal-overlay.show { display: flex; }
    .modal-box {
      background: #fff;
      border-radius: var(--radius);
      max-width: 680px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      position: relative;
    }
    .modal-box .modal-header {
      background: var(--primary);
      color: #fff;
      padding: 24px 28px 20px;
      border-radius: var(--radius) var(--radius) 0 0;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .modal-box .modal-header .modal-date {
      font-size: 13px;
      opacity: 0.75;
      margin-bottom: 4px;
    }
    .modal-box .modal-header .modal-title {
      font-size: 18px;
      font-weight: 700;
    }
    .modal-box .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .modal-box .modal-close:hover { background: rgba(255,255,255,0.3); }
    .modal-box .modal-content {
      padding: 24px 28px 32px;
    }
    .modal-content .section-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--primary);
      margin: 20px 0 8px;
      padding-bottom: 4px;
      border-bottom: 2px solid var(--primary);
      display: inline-block;
    }
    .modal-content .section-title:first-child { margin-top: 0; }
    .modal-content .news-item {
      font-size: 14px;
      line-height: 1.8;
      color: var(--text);
      padding: 8px 0;
      border-bottom: 1px solid #f4f6f8;
    }
    .modal-content .news-item:last-child { border-bottom: none; }
    .modal-content .gold-price {
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 8px;
      padding: 12px 16px;
      margin-top: 16px;
      font-size: 13px;
      color: #92400e;
    }

    /* 响应式 */
    @media (max-width: 640px) {
      .news-grid { grid-template-columns: 1fr; }
      .page-header h1 { font-size: 22px; }
      .modal-overlay { padding: 16px; }
    }
  </style>
</head>
<body>

  <!-- 顶部导航 -->
  <div class="top-bar">
    <a href="index.html" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
      返回首页
    </a>
    <span class="page-title">班级文化建设</span>
    <div class="spacer"></div>
  </div>

  <!-- 页面头部 -->
  <div class="page-header">
    <h1>每日新闻</h1>
    <p>七班同学精心整理的每日时事热点</p>
  </div>

  <!-- 新闻卡片网格 -->
  <div class="news-grid" id="newsGrid"></div>

  <!-- 详情模态框 -->
  <div class="modal-overlay" id="modal">
    <div class="modal-box">
      <div class="modal-header">
        <div class="modal-date" id="modalDate"></div>
        <div class="modal-title" id="modalTitle"></div>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-content" id="modalContent"></div>
    </div>
  </div>

  <script>
    // 新闻数据（从 news-data.json 内嵌）
    var newsData = [];

    // 分类映射
    var categoryMap = {
      '时政': { class: 'cat-politics', label: '时政' },
      '财经': { class: 'cat-finance', label: '财经' },
      '科技': { class: 'cat-tech', label: '科技' },
      '社会': { class: 'cat-social', label: '社会' },
      '文娱': { class: 'cat-entertainment', label: '文娱' },
      '娱乐': { class: 'cat-entertainment', label: '文娱' },
      '国际': { class: 'cat-international', label: '国际' },
      '体育': { class: 'cat-sports', label: '体育' },
    };

    // 获取新闻分类
    function getCategories(content) {
      var cats = [];
      for (var i = 0; i < content.length; i++) {
        var line = content[i];
        var match = line.match(/^[一二三四五六七八九十]+、(.+)/);
        if (match && categoryMap[match[1]]) {
          cats.push(match[1]);
        }
      }
      return cats.length > 0 ? cats : ['其他'];
    }

    // 生成摘要（取前几个分类的第一条内容）
    function getSummary(content) {
      var parts = [];
      for (var i = 0; i < content.length && parts.length < 3; i++) {
        var line = content[i];
        if (line.length > 10 && !line.match(/^[一二三四五六七八九十]+、/)) {
          // 截取前50字
          var short = line.length > 50 ? line.substring(0, 50) + '...' : line;
          parts.push(short);
        }
      }
      return parts.join(' ');
    }

    // 获取某分类下的条目
    function getCategoryItems(content, category) {
      var items = [];
      var inCat = false;
      for (var i = 0; i < content.length; i++) {
        var line = content[i];
        var match = line.match(/^[一二三四五六七八九十]+、(.+)/);
        if (match) {
          if (match[1] === category || (category === '文娱' && match[1] === '娱乐')) {
            inCat = true;
            continue;
          } else {
            inCat = false;
          }
        }
        if (inCat && line.length > 5) {
          items.push(line);
        }
      }
      return items;
    }

    // 检查是否包含金价信息
    function getGoldPrice(content) {
      for (var i = content.length - 1; i >= 0; i--) {
        if (content[i].indexOf('金价') > -1 || content[i].indexOf('黄金') > -1) {
          return content.slice(Math.max(0, i - 1), i + 1).join(' / ');
        }
      }
      return '';
    }

    // 渲染新闻网格
    function renderNewsGrid() {
      var grid = document.getElementById('newsGrid');
      var html = '';
      var lastMonth = '';

      newsData.forEach(function(news, idx) {
        // 按日期倒序
        var month = news.date.substring(0, 7);
        if (month !== lastMonth) {
          lastMonth = month;
          var monthLabel = month.replace('2025-', '2025年') + '月';
          html += '<div class="month-divider">' + monthLabel + '</div>';
        }

        var cats = getCategories(news.content);
        var summary = getSummary(news.content);
        var catClass = categoryMap[cats[0]] ? categoryMap[cats[0]].class : 'cat-other';
        var catLabel = categoryMap[cats[0]] ? categoryMap[cats[0]].label : cats[0];

        html += '<div class="news-card" data-idx="' + idx + '">';
        html += '  <div class="card-top">';
        html += '    <div class="card-date">' + news.folder + '</div>';
        html += '    <div class="card-title">' + news.title + '</div>';
        html += '  </div>';
        html += '  <div class="card-body">';
        html += '    <span class="category-tag ' + catClass + '">' + catLabel + '</span>';
        cats.slice(1).forEach(function(c) {
          var cc = categoryMap[c] || { class: 'cat-other', label: c };
          html += ' <span class="category-tag ' + cc.class + '" style="margin-left:4px;">' + cc.label + '</span>';
        });
        html += '    <div class="card-summary">' + summary + '</div>';
        html += '  </div>';
        html += '  <div class="card-footer">';
        html += '    <span class="item-count">' + news.content.length + ' 条</span>';
        html += '    <a class="read-more" href="javascript:void(0)">查看全文</a>';
        html += '  </div>';
        html += '</div>';
      });

      grid.innerHTML = html;

      // 绑定点击事件
      grid.querySelectorAll('.news-card').forEach(function(card) {
        card.addEventListener('click', function() {
          openModal(parseInt(card.dataset.idx));
        });
      });
    }

    // 打开模态框
    function openModal(idx) {
      var news = newsData[idx];
      var modal = document.getElementById('modal');
      document.getElementById('modalDate').textContent = news.folder;
      document.getElementById('modalTitle').textContent = news.title;

      var contentHtml = '';
      var cats = getCategories(news.content);
      var currentCat = '';
      var currentItems = [];

      for (var i = 0; i < news.content.length; i++) {
        var line = news.content[i];
        var match = line.match(/^[一二三四五六七八九十]+、(.+)/);

        if (match && categoryMap[match[1]]) {
          // 先输出上一个分类
          if (currentItems.length > 0) {
            contentHtml += '<div class="section-title">' + currentCat + '</div>';
            currentItems.forEach(function(item) {
              contentHtml += '<div class="news-item">' + item + '</div>';
            });
          }
          currentCat = (categoryMap[match[1]] || { label: match[1] }).label;
          currentItems = [];
        } else if (line.indexOf('金价') > -1 || (line.indexOf('美元') > -1 && line.indexOf('盎司') > -1) || (line.indexOf('数据来源') > -1)) {
          // 金价信息单独处理
          if (currentItems.length > 0) {
            // 金价归入最后一个分类
          }
          currentItems.push(line);
        } else if (line.length > 3) {
          currentItems.push(line);
        }
      }
      // 最后一个分类
      if (currentItems.length > 0) {
        contentHtml += '<div class="section-title">' + currentCat + '</div>';
        currentItems.forEach(function(item) {
          contentHtml += '<div class="news-item">' + item + '</div>';
        });
      }

      // 金价信息
      var gold = getGoldPrice(news.content);
      if (gold) {
        contentHtml += '<div class="gold-price">💰 ' + gold + '</div>';
      }

      document.getElementById('modalContent').innerHTML = contentHtml;
      modal.classList.add('show');
      document.body.style.overflow = 'hidden';
    }

    // 关闭模态框
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
    });
    function closeModal() {
      document.getElementById('modal').classList.remove('show');
      document.body.style.overflow = '';
    }

    // 加载数据（内嵌，支持 file:/// 协议直接打开）
    var newsData = [
  {
    "date": "2025-03-24",
    "folder": "3月24日",
    "title": "3月24日新闻",
    "content": [
      "一、时政",
      "习近平总书记指引雄安发展持续引发关注，雄安新区发展建设相关动态稳居热搜高位，新区在产业布局、城市建设、民生保障等方面的推进成果持续受到社会各界关注。",
      "金融监管总局副局长周亮被查，相关消息成为社会热点，彰显我国持续推进金融领域反腐、维护金融市场健康发展的坚定决心。",
      "外交部回应日方拟将中日关系降级，中方表明严正立场，强调中日关系的健康发展需要双方秉持正确认知，共同维护双边关系大局。",
      "妇联回应重庆地铁吐血女孩事件，表示高度关注胡心瑶的遭遇，将根据其实际需求提供相应的帮扶与支持，切实维护弱势群体的合法权益。",
      "二、财经",
      "博鳌亚洲论坛发布 2026 年度经济报告，预计 2026 年亚洲经济增速达 4.5%，按购买力平价计算亚洲经济体 GDP 占世界经济比重将升至 49.7%，中国和东盟仍是亚洲最具外资吸引力的经济体。",
      "A 股迎来反攻且关键时刻资金猛加仓，市场整体情绪回暖，A 股大反攻的核心驱动因素被逐步挖掘，成为投资者关注的核心热点。",
      "国内金价跌破 970 元 / 克，金价下跌打乱金饰行业涨价计划，部分金店店员表示按九百多的价格宁愿不卖，而老铺黄金却逆势涨超 16%，黄金市场呈现分化态势。",
      "“中园石化” 碰瓷 “中国石化” 引关注，市监局对此作出回应，明确将依法查处此类商标侵权、混淆视听的市场行为，维护市场公平竞争秩序。",
      "三、科技",
      "问界 M8 焕新升级首发评测重磅发布，作为新能源汽车领域的热门车型，其升级后的配置、性能、智能化体验等成为科技和汽车领域的关注焦点。",
      "各地文旅对 AI 千问技术加大应用力度，文旅行业借助人工智能技术创新宣传形式、优化服务体验，推动文旅产业数字化升级，相关话题登上热搜。",

      "四、社会",

      "4 岁女童被母亲冒充就诊 177 次，该事件曝光后引发社会强烈谴责，母亲的不当行为不仅浪费医疗资源，更涉嫌违法，相关部门已介入调查。",
      "面筋哥女儿自曝遭继父持续 4 年性骚扰，女孩的遭遇引发社会对未成年人保护问题的再次关注，网友纷纷呼吁依法严惩施暴者，加强对未成年人的权益保障。",
