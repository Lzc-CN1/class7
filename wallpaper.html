<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>班级电脑壁纸 · 深技大附中2024级七班</title>
  <meta name="description" content="深圳技术大学附属中学2024级七班 - 历届班级专属电脑桌面壁纸" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%232d6a9f'/><text x='50' y='72' font-size='60' font-weight='900' fill='white' text-anchor='middle' font-family='sans-serif'>七</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #2d6a9f;
      --primary-light: #4a90c4;
      --accent: #f5a623;
      --bg: #f8faff;
      --text: #2c3e50;
      --text-light: #7f8c9b;
      --radius: 12px;
      --font: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── 顶部导航 ── */
    .top-bar {
      background: #fff;
      border-bottom: 1px solid #eef1f5;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .top-bar .back-link {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-light);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }
    .top-bar .back-link:hover { color: var(--primary); }
    .top-bar .back-link svg { width: 18px; height: 18px; }
    .top-bar .page-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }
    .top-bar .spacer { width: 60px; }

    /* ── 页面头部 ── */
    .page-header {
      background: #fff;
      padding: 48px 24px 36px;
      text-align: center;
      border-bottom: 1px solid #eef1f5;
    }
    .page-header .icon {
      font-size: 40px;
      margin-bottom: 12px;
      display: block;
    }
    .page-header h1 {
      font-size: 28px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: 1px;
    }
    .page-header p {
      font-size: 14px;
      color: var(--text-light);
      margin-top: 8px;
    }
    .page-header .count-badge {
      display: inline-block;
      margin-top: 14px;
      padding: 4px 14px;
      background: #eef4fb;
      color: var(--primary);
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
    }

    /* ── 壁纸网格 ── */
    .wallpaper-container {
      max-width: 1000px;
      margin: 40px auto 80px;
      padding: 0 24px;
    }
    .wallpaper-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 28px;
    }
    .wallpaper-card {
      background: #fff;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid #eef1f5;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    }
    .wallpaper-card:hover {
      border-color: var(--primary-light);
      box-shadow: 0 6px 24px rgba(45, 106, 159, 0.13);
      transform: translateY(-3px);
    }
    .wallpaper-card .card-img-wrap {
      position: relative;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: #e8edf3;
    }
    .wallpaper-card .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }
    .wallpaper-card:hover .card-img-wrap img {
      transform: scale(1.05);
    }
    .wallpaper-card .zoom-hint {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(26, 74, 117, 0.3);
      opacity: 0;
      transition: opacity 0.25s;
    }
    .wallpaper-card:hover .zoom-hint { opacity: 1; }
    .wallpaper-card .zoom-hint svg {
      width: 36px;
      height: 36px;
      fill: none;
      stroke: #fff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3));
    }
    .wallpaper-card .card-body {
      padding: 16px 20px 18px;
    }
    .wallpaper-card .card-body .card-period {
      font-size: 12px;
      font-weight: 500;
      color: var(--primary);
      background: #eef4fb;
      border-radius: 10px;
      padding: 2px 10px;
      display: inline-block;
      margin-bottom: 8px;
    }
    .wallpaper-card .card-body h3 {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }
    .wallpaper-card .card-body p {
      font-size: 13px;
      color: var(--text-light);
      line-height: 1.6;
    }
    .wallpaper-card .card-footer {
      padding: 0 20px 14px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }
    .wallpaper-card .card-footer .view-btn {
      font-size: 13px;
      color: var(--primary);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .wallpaper-card .card-footer .view-btn svg {
      width: 14px;
      height: 14px;
      stroke: var(--primary);
      fill: none;
      stroke-width: 2;
      transition: transform 0.2s;
    }
    .wallpaper-card:hover .card-footer .view-btn svg {
      transform: translateX(3px);
    }

    /* ── 下载提示 ── */
    .download-tip {
      max-width: 1000px;
      margin: 0 auto 0;
      padding: 0 24px;
      text-align: center;
    }
    .download-tip p {
      font-size: 13px;
      color: var(--text-light);
      padding: 14px 20px;
      background: #fff;
      border: 1px solid #eef1f5;
      border-radius: 8px;
      display: inline-block;
    }

    /* ── 大图预览 Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      z-index: 9000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-img {
      max-width: 92vw;
      max-height: 82vh;
      border-radius: 8px;
      object-fit: contain;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
      transform: scale(0.95);
      transition: transform 0.25s ease;
    }
    .modal-overlay.open .modal-img {
      transform: scale(1);
    }
    .modal-label {
      margin-top: 16px;
      color: rgba(255, 255, 255, 0.75);
      font-size: 14px;
      letter-spacing: 0.05em;
    }
    .modal-close {
      position: fixed;
      top: 20px;
      right: 24px;
      background: rgba(255, 255, 255, 0.15);
      border: none;
      color: #fff;
      font-size: 20px;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      z-index: 9100;
    }
    .modal-close:hover { background: rgba(255, 255, 255, 0.28); }
    /* 左右切换按钮 */
    .modal-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.15);
      border: none;
      color: #fff;
      font-size: 26px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      z-index: 9100;
    }
    .modal-nav:hover { background: rgba(255, 255, 255, 0.28); }
    .modal-nav.prev { left: 20px; }
    .modal-nav.next { right: 20px; }
    @media (max-width: 600px) {
      .modal-nav { display: none; }
      .wallpaper-grid { grid-template-columns: 1fr; }
      .page-header h1 { font-size: 22px; }
    }
  </style>
</head>
<body>

  <!-- 顶部导航 -->
  <header class="top-bar">
    <a href="index.html#culture" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
      返回班级文化建设
    </a>
    <span class="page-title">班级电脑壁纸</span>
    <span class="spacer"></span>
  </header>

  <!-- 页面头部 -->
  <div class="page-header">
    <span class="icon">🖥️</span>
    <h1>班级电脑壁纸</h1>
    <p>七班专属桌面壁纸，共同的班级记忆</p>
    <span class="count-badge">共 4 期</span>
  </div>

  <!-- 下载提示 -->
  <div class="download-tip" style="margin-top: 32px;">
    <p>💡 点击图片可全屏查看 · 长按或右键图片可保存到本地</p>
  </div>

  <!-- 壁纸网格 -->
  <div class="wallpaper-container">
    <div class="wallpaper-grid" id="wallpaperGrid">

      <div class="wallpaper-card" onclick="openModal(0)">
        <div class="card-img-wrap">
          <img src="assets/images/wallpaper1.png" alt="七班壁纸 第一期" loading="eager" />

            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
          </div>
        </div>
        <div class="card-body">
          <span class="card-period">第一期</span>
          <h3>七班壁纸 · 第一期</h3>
          <p>2024级七班首款专属电脑桌面壁纸</p>
        </div>
        <div class="card-footer">
          <span class="view-btn">
            查看大图
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </span>
        </div>
      </div>

      <div class="wallpaper-card" onclick="openModal(1)">
        <div class="card-img-wrap">
          <img src="assets/images/wallpaper2.png" alt="七班壁纸 第二期" loading="lazy" />
          <div class="zoom-hint">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
          </div>
        </div>
        <div class="card-body">
          <span class="card-period">第二期</span>
          <h3>七班壁纸 · 第二期</h3>
          <p>2024级七班第二款专属电脑桌面壁纸</p>
        </div>
        <div class="card-footer">
          <span class="view-btn">
            查看大图
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </span>
        </div>
      </div>

      <div class="wallpaper-card" onclick="openModal(2)">
        <div class="card-img-wrap">
          <img src="assets/images/wallpaper3.png" alt="七班壁纸 第三期" loading="lazy" />
          <div class="zoom-hint">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
          </div>
        </div>
        <div class="card-body">
          <span class="card-period">第三期</span>
          <h3>七班壁纸 · 第三期</h3>
          <p>2024级七班第三款专属电脑桌面壁纸</p>
        </div>
        <div class="card-footer">
          <span class="view-btn">
            查看大图
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </span>
        </div>
      </div>

      <div class="wallpaper-card" onclick="openModal(3)">
        <div class="card-img-wrap">
          <img src="assets/images/wallpaper4.png" alt="七班壁纸 第四期" loading="lazy" />
          <div class="zoom-hint">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
          </div>
        </div>
        <div class="card-body">
          <span class="card-period">第四期</span>
          <h3>七班壁纸 · 第四期（重制版）</h3>
          <p>2024级七班第四款专属电脑桌面壁纸</p>
        </div>
        <div class="card-footer">
          <span class="view-btn">
            查看大图
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </span>
        </div>
      </div>

    </div>
  </div>

  <!-- 大图预览 Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <button class="modal-close" id="modalClose">✕</button>
    <button class="modal-nav prev" id="modalPrev">‹</button>
    <button class="modal-nav next" id="modalNext">›</button>
    <img class="modal-img" id="modalImg" src="" alt="" />
    <div class="modal-label" id="modalLabel"></div>
  </div>

  <script>
    var wallpapers = [
      { src: 'assets/images/wallpaper1.png', label: '七班壁纸 · 第一期' },
      { src: 'assets/images/wallpaper2.png', label: '七班壁纸 · 第二期' },
      { src: 'assets/images/wallpaper3.png', label: '七班壁纸 · 第三期' },
      { src: 'assets/images/wallpaper4.png', label: '七班壁纸 · 第四期（重制版）' }
    ];
    var currentIndex = 0;

    var overlay = document.getElementById('modalOverlay');
    var modalImg = document.getElementById('modalImg');
    var modalLabel = document.getElementById('modalLabel');

    function openModal(index) {
      currentIndex = index;
      var w = wallpapers[currentIndex];
      modalImg.src = w.src;
      modalImg.alt = w.label;
      modalLabel.textContent = w.label + ' (' + (currentIndex + 1) + ' / ' + wallpapers.length + ')';
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      overlay.classList.remove('open');
      document.body.style.overflow = '';
      setTimeout(function() { modalImg.src = ''; }, 300);
    }

    function prevWallpaper() {
      currentIndex = (currentIndex - 1 + wallpapers.length) % wallpapers.length;
      var w = wallpapers[currentIndex];
      modalImg.src = w.src;
      modalLabel.textContent = w.label + ' (' + (currentIndex + 1) + ' / ' + wallpapers.length + ')';
    }

    function nextWallpaper() {
      currentIndex = (currentIndex + 1) % wallpapers.length;
      var w = wallpapers[currentIndex];
      modalImg.src = w.src;
      modalLabel.textContent = w.label + ' (' + (currentIndex + 1) + ' / ' + wallpapers.length + ')';
    }

    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modalPrev').addEventListener('click', prevWallpaper);
    document.getElementById('modalNext').addEventListener('click', nextWallpaper);
    overlay.addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
    document.addEventListener('keydown', function(e) {
      if (!overlay.classList.contains('open')) return;
      if (e.key === 'Escape') closeModal();
      if (e.key === 'ArrowLeft') prevWallpaper();
      if (e.key === 'ArrowRight') nextWallpaper();
    });
  </script>
</body>
</html>
